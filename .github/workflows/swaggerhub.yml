name: Update SwaggerHub

on:
  push:
    branches:
      - dev
    paths:
      - docs/api/**
  workflow_dispatch:

jobs:
  update-swaggerhub:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The source spec $refs into docs/api/shared/. SwaggerHub cannot resolve
      # local file refs, so upload the bundled single-document form.
      - name: Bundle spec
        run: npx nx run api-client:bundle-spec

      - name: Update SwaggerHub
        run: |
          curl -fsS -X POST \
            "https://api.swaggerhub.com/apis/adepttechnologies/Intranet" \
            -H "Authorization: ${{ secrets.SWAGGERHUB_API_KEY }}" \
            -H "Content-Type: application/yaml" \
            --data-binary @dist/api-spec/tcheck-corporate.yaml
