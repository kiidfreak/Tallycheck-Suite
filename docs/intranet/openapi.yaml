openapi: 3.0.3
info:
  title: Intranet v2 API
  description: |
    REST API documentation for Adept's Intranet v2.
    Covers authentication, attendance clock-in/out, employee/department management,
    HR corrections, reporting, and role-based access control.

    ## Roles
    | Role | Permissions |
    |------|-------------|
    | `Employee` | Clock self in/out, view own records |
    | `Manager` | View team records (scoped to their department) |
    | `HR` | Full employee management, attendance corrections, reports |
    | `Admin` | Same as HR + system configuration |

    ## Authentication
    All protected endpoints require a Bearer JWT in the `Authorization` header.
    Tokens carry a `role` claim used for server-side enforcement.
  version: 2.0.0

servers: # Should add one for staging
  # Added by API Auto Mocking Plugin
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/adepttechnologies/Intranet/2.0.0
  - url: http://localhost:5000/api/v2
    description: Local development
  - url: https://intranet.adept-techno.co.ke/api/v2
    description: Production

tags:
  - name: Health
    description: Service liveness check
  - name: Auth
    description: Registration, login, token management
  - name: Attendance
    description: Clock-in/out and personal attendance history
  - name: HR - Employees
    description: Employee CRUD operations (HR/Admin only)
  - name: HR - Departments
    description: Department CRUD operations (HR/Admin only)
  - name: HR - Attendance
    description: Team views and attendance corrections (Manager/HR)
  - name: Reports
    description: Aggregated attendance reporting and CSV export

# ==========================================================
# GLOBAL SECURITY. Applies to every endpoint. To overwrite
# include "security: []" in that endpoint
# ==========================================================
security:
  - Auth0: []

# ==========================================================
# REUSABLE STRUCTURES
# ==========================================================
components:
  securitySchemes:
    Auth0:
      type: openIdConnect
      openIdConnectUrl: https://dev-2685h5q7efjt6peh.us.auth0.com/.well-known/openid-configuration

  # ==========================================================
  # REUSABLE SCHEMAS
  # ==========================================================
  schemas:
    ErrorCode: # To be replicated in the backend i.e. class ErrorCode: INVALID_CREDENTIALS = "invalid_credentials", etc
      type: string
      enum:
        # Auth
        - invalid_credentials
        - account_not_approved
        - account_inactive
        - token_expired
        - token_invalid
        - insufficient_permissions
        # Attendance
        - already_clocked_in
        - not_clocked_in
        - attendance_record_not_found
        # Employees / Departments
        - email_already_exists
        - employee_not_found
        - department_not_found
        - department_has_employees
        # General
        - validation_error
        - internal_error
        - not_found

    ErrorResponse:
      type: object
      properties:
        error:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
          example: "You are already clocked in"
        details:
          type: string
          nullable: true
          description: >
            Raw exception detail i.e. the 'e' in "except Exception as e". Display for all 5xx errors in debug mode and
            for all 422 errors, no other ones.
          example: "ValueError: clock_in must be before clock_out"

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        pages:
          type: integer
          example: 5

    # ==========================================================
    # AUTH
    # ==========================================================
    RegisterRequest:
      type: object
      description: Onboards an already-authenticated Auth0 user. All fields are optional with server-side fallbacks.
      properties:
        first_name:
          type: string
          example: "Philomena"
        last_name:
          type: string
          example: "Shirandula"
        email:
          type: string
          format: email
          example: "philomena.shirandula@adept-techno.com"

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Seconds until the access token expires
          example: 86400
        token_type:
          type: string
          example: "Bearer"

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
          example: 12
        email:
          type: string
          example: "philomena.shirandula@adept-techno.com"
        first_name:
          type: string
          example: "Philomena"
        last_name:
          type: string
          example: "Shirandula"
        role_id:
          type: integer
          example: 1
        role_name:
          type: string
          enum:
            [
              staff,
              hr,
              manager,
              super_admin,
              call_centre_agent,
              call_centre_admin,
            ]
          example: "staff"
        is_approved:
          type: boolean
          example: true
        is_internal:
          type: boolean
          example: false
        standard_shift:
          type: string
          enum: [morning, afternoon]
          example: "morning"
        is_manager:
          type: boolean
          example: false
        department_id:
          type: integer
          example: 3
        department_name:
          type: string
          nullable: true
          example: "software_development"

    # ==========================================================
    # ATTENDANCE
    # ==========================================================
    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
          example: 101
        employee_id:
          type: integer
          example: 12
        clock_in:
          type: string
          format: date-time
          example: "2026-06-10T08:02:11Z"
        clock_out:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-10T17:05:44Z"
        work_date:
          type: string
          format: date
          example: "2026-06-10"
        worked_hours:
          type: number
          format: float
          nullable: true
          example: 9.06
        source:
          type: string
          example: "web"
        status:
          type: string
          enum: [open, closed, corrected]
          example: "closed"
        notes:
          type: string
          nullable: true
          example: null
        edited_by:
          type: integer
          nullable: true
          description: "Employee ID of the HR/Admin who last edited this record"

    ClockInResponse:
      type: object
      properties:
        record:
          $ref: "#/components/schemas/AttendanceRecord"
        message:
          type: string
          example: "Clocked in at 08:02 UTC"

    ClockOutResponse:
      type: object
      properties:
        record:
          $ref: "#/components/schemas/AttendanceRecord"
        message:
          type: string
          example: "Clocked out. Worked 9.06 hours."

    AttendanceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRecord"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    AttendanceCorrectionRequest:
      type: object
      required: [reason]
      properties:
        clock_in:
          type: string
          format: date-time
          example: "2026-06-10T08:00:00Z"
        clock_out:
          type: string
          format: date-time
          example: "2026-06-10T17:00:00Z"
        notes:
          type: string
          example: "Employee forgot to clock out."
        reason:
          type: string
          description: "Mandatory audit reason for any correction"
          example: "Clock-out was missed due to system downtime."

    AttendanceManualRequest:
      type: object
      required: [employee_id, work_date, clock_in, clock_out, reason]
      description: Manually create and attendance tackle on behalf of an employee
      properties:
        employee_id:
          type: integer
          example: 12
        work_date:
          type: string
          format: date
          example: "2026-06-09"
        clock_in:
          type: string
          format: date-time
          example: "2026-06-09T08:00:00Z"
        clock_out:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-09T17:00:00Z"
        reason:
          type: string
          example: "Employee worked on-site without system access."

    # ==========================================================
    # EMPLOYEE
    # ==========================================================
    Employee:
      type: object
      properties:
        id:
          type: integer
          example: 12
        email:
          type: string
          example: "philomena.shirandula@adept-techno.com"
        first_name:
          type: string
          example: "John"
        last_name:
          type: string
          example: "Doe"
        role_id:
          type: integer
          example: 1
        role_name:
          type: string
          enum:
            [
              staff,
              hr,
              manager,
              super_admin,
              call_centre_agent,
              call_centre_admin,
            ]
          example: "staff"
        department_id:
          type: integer
          nullable: true
          example: 3
        department_name:
          type: string
          nullable: true
          example: "software_development"
        is_active:
          type: boolean
          example: true
        is_approved:
          type: boolean
          example: true
        is_manager:
          type: boolean
          example: false
        hire_date:
          type: string
          format: date
          nullable: true
          example: "2025-03-01"
        created_at:
          type: string
          format: date-time
        standard_shift:
          type: string
          enum: [morning, afternoon]
          example: "morning"
        shift_type:
          type: string
          enum: [standard, extended]
          example: "extended"
        shift_hours:
          type: string
          enum: ["7am-5pm", "9am-7pm", "7am-430pm", "9am-630pm", "custom"]
          example: "9am-7pm"
        shift_duration_hours:
          type: number
          format: float
          example: 9.5
        custom_shift_start:
          type: string
          nullable: true
          example: "08:00"
        custom_shift_end:
          type: string
          nullable: true
          example: "17:30"

    EmployeeCreateRequest:
      type: object
      required: [first_name, last_name, email, department, role]
      properties:
        first_name:
          type: string
          example: "Chieth"
        last_name:
          type: string
          example: "Maduong"
        email:
          type: string
          format: email
          example: "chieth.maduong@adept-techno.com"
        role_id:
          type: integer
          nullable: true
          example: 1
        department_id:
          type: integer
          nullable: true
          example: 2
        hire_date:
          type: string
          format: date
          example: "2026-06-10"
        is_manager:
          type: boolean
          default: false
        is_internal:
          type: boolean
          default: true
        is_approved:
          type: boolean
          default: false
        shift_type:
          type: string
          enum: [standard, extended]
          example: "standard"
        shift_hours:
          type: string
          enum: ["7am-5pm", "9am-7pm", "7am-430pm", "9am-630pm", "custom"]
          example: "7am-5pm"
        custom_shift_start:
          type: string
          nullable: true
          example: "08:00"
        custom_shift_end:
          type: string
          nullable: true
          example: "18:00"

    EmployeeUpdateRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        role_id:
          type: integer
          example: 2
        department_id:
          type: integer
          nullable: true
        is_manager:
          type: boolean
        is_active:
          type: boolean
        is_approved:
          type: boolean
        hire_date:
          type: string
          format: date
        shift_type:
          type: string
          enum: [standard, extended]
        shift_hours:
          type: string
          enum: ["7am-5pm", "9am-7pm", "7am-430pm", "9am-630pm", "custom"]
        custom_shift_start:
          type: string
          nullable: true
        custom_shift_end:
          type: string
          nullable: true

    # ==========================================================
    # DEPARTMENT
    # ==========================================================
    Department:
      type: object
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: "software_development"
        manager_id:
          type: integer
          nullable: true
          example: 7
        manager_name:
          type: string
          nullable: true
          example: "Barack Osama"
        employee_count:
          type: integer
          example: 12
        parent_department_id:
          type: integer
          nullable: true
          example: 1
        parent_department_name:
          type: string
          nullable: true
          example: "Executive"

    DepartmentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "finance"
        manager_id:
          type: integer
          nullable: true
          example: 7
        parent_department_id:
          type: integer
          nullable: true
          example: 2

    # ==========================================================
    # ORGANIZATIONS (MULTI-TENANCY)
    # ==========================================================
    Organization:
      type: object
      properties:
        id:
          type: string
          example: "org_0D0uiOBBi91ZiW0v"
        name:
          type: string
          example: "Daystar University"
        domain:
          type: string
          example: "daystar"
        schema_name:
          type: string
          example: "tenant_org_0d0uiobbi91ziw0v"
        is_active:
          type: boolean
          example: true
        org_type:
          type: string
          enum: [corporate, education]
          example: "education"
        admin_email:
          type: string
          example: "anne@daystar.ac.ke"

    CreateOrganizationPayload:
      type: object
      required: [name, domain, org_type, admin_email]
      properties:
        name:
          type: string
          example: "Acme Corporation"
        domain:
          type: string
          example: "acme"
        org_type:
          type: string
          enum: [corporate, education]
          example: "corporate"
        admin_email:
          type: string
          example: "admin@acme.com"

    # ==========================================================
    # REPORTS
    # ==========================================================
    ReportEmployeeAttendance:
      type: object
      properties:
        employee_id:
          type: integer
          example: 12
        employee_name:
          type: string
          example: "Nyambane Mogaka"
        department:
          type: string
          example: "software_development"
        total_days_present:
          type: integer
          example: 18
        total_days_absent:
          type: integer
          example: 2
        total_hours_worked:
          type: number
          format: float
          example: 162.5
        avg_clock_in:
          type: string
          example: "08:07"
        avg_clock_out:
          type: string
          example: "17:23"
        late_days:
          type: integer
          example: 3

    ReportDepartmentAttendance:
      type: object
      properties:
        department_id:
          type: integer
          example: 2
        department_name:
          type: string
          example: "Software Development"
        date_from:
          type: string
          format: date
        date_to:
          type: string
          format: date
        total_employees:
          type: integer
          example: 4
        avg_attendance_rate:
          type: number
          format: float
          description: "Percentage 0–100"
          example: 94.5
        total_hours_worked:
          type: number
          format: float
          example: 640.5
        employees:
          type: array
          items:
            $ref: "#/components/schemas/ReportEmployeeAttendance"

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
          example: 1
        attendance_id:
          type: integer
          example: 4
        changed_by:
          type: integer
          description: "Employee ID of the editor"
          example: 7
        changed_at:
          type: string
          format: date-time
          example: "2026-06-10T11:13:00Z"
        reason:
          type: string
          example: "Employee wasn't able to clock-in in the morning"
        previous_clock_in:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-10T11:13:00Z"
        previous_clock_out:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-10T11:13:00Z"

  # ==========================================================
  # REUSABLE RESPONSES
  # ==========================================================
  responses:
    Unauthorized: # Can be referenced as '#/components/responses/unauthorized'
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Business rule conflict (e.g. already clocked in)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnprocessableEntity:
      description: Validation error e.g. missing required field
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ==========================================================
  # REUSABLE PARAMETERS
  # ==========================================================
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    DateFromParam:
      name: date_from
      in: query
      schema:
        type: string
        format: date
      example: "2026-06-01"
    DateToParam:
      name: date_to
      in: query
      schema:
        type: string
        format: date
      example: "2026-06-30"
    EmployeeIdParam:
      name: employee_id
      in: query
      schema:
        type: integer
    DepartmentIdParam:
      name: department_id
      in: query
      schema:
        type: integer
    DepartmentNameParam:
      name: department_name
      in: query
      schema:
        type: string
        example: "software_development"

# ==========================================================
# PATHS
# ==========================================================
paths:
  # ==========================================================
  # HEALTH
  # ==========================================================
  /health:
    get:
      tags: [Health]
      summary: Service health check
      operationId: health_check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Tells you the API is healthy
                    enum: [ok, down]
                    example: "ok"
                  db:
                    type: string
                    description: Tells you the db connections is healthy
                    enum: [connected, unreachable]
                    example: connected

  # ==========================================================
  # AUTH
  # ==========================================================
  /auth/register:
    post:
      tags: [Auth]
      summary: Complete onboarding of an existing Auth0 user
      operationId: authRegister
      description: |
        Creates a new employee record for an already authenticated Auth0 user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created, pending approval
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registration successful. Awaiting HR approval."
                  employee_id:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /auth/login:
    post:
      tags: [Auth]
      summary: Validates that the authenticated Auth0 user exists in the app DB and is approved.
      operationId: authLogin
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  employee:
                    $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user's app profile
      operationId: auth_me
      responses:
        "200":
          description: Current user's profile from the application database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================
  # ATTENDANCE (EMPLOYEES)
  # ==========================================================
  /attendance/clock-in:
    post:
      tags: [Attendance]
      summary: Clock in (Employee)
      operationId: clock_in
      description: |
        Records a server-side clock-in timestamp for the authenticated employee.
        Returns `409` if the employee already has an open (un-closed) record for today.
      responses:
        "201":
          description: Clocked in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockInResponse"
        "409":
          description: Already clocked in, an open record exists
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /attendance/clock-out:
    post:
      tags: [Attendance]
      summary: Clock out (Employee)
      operationId: clock_out
      description: |
        Closes the current open attendance record. Returns `409` if no open record
        exists (i.e. employee has not clocked in).
      responses:
        "200":
          description: Clocked out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockOutResponse"
        "409":
          description: No open record exists
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /attendance/me:
    get:
      tags: [Attendance]
      summary: Get own attendance history
      operationId: my_attendance
      parameters:
        - $ref: "#/components/parameters/DateFromParam"
        - $ref: "#/components/parameters/DateToParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Paginated attendance records for the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ==========================================================
  # ATTENDANCE (HR)
  # ==========================================================
  /attendance:
    get:
      tags: [HR - Attendance]
      summary: Query attendance records
      operationId: list_attendance
      description: |
        Managers - retrieve attendance records for their department
        HR - retrieve attendance records for all employees
      parameters:
        - $ref: "#/components/parameters/EmployeeIdParam"
        - $ref: "#/components/parameters/DepartmentIdParam"
        - $ref: "#/components/parameters/DateFromParam"
        - $ref: "#/components/parameters/DateToParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, corrected]
      responses:
        "200":
          description: Filtered, paginated attendance records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [HR - Attendance]
      summary: Manually create an attendance record (HR only)
      operationId: create_attendance_manual
      description: |
        Backfill or manually enter an attendance record on behalf of an employee.
        Writes an audit log entry with the mandatory `reason` field.
        Sets that attendance record's status to 'corrected.'
        Only done by HR & Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceManualRequest"
      responses:
        "201":
          description: Manual record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: A record for that employee/date already exists
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /attendance/{id}:
    put:
      tags: [HR - Attendance]
      summary: Correct an existing attendance record (HR only)
      operationId: correct_attendance
      description: |
        HR/Admin can update `clock_in`, `clock_out`, or `notes` on any record.
        Every correction writes an audit log entry; `reason` is mandatory.
        **Roles:** HR, Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceCorrectionRequest"
      responses:
        "200":
          description: Record corrected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /attendance/{id}/audit:
    get:
      tags: [HR - Attendance]
      summary: Get audit trail for a record (HR only)
      operationId: get_attendance_audit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ordered list of audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  record_id:
                    type: integer
                  audit_log:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================
  # EMPLOYEES (HR)
  # ==========================================================
  /employees:
    get:
      tags: [HR - Employees]
      summary: List all employees (HR only)
      operationId: list_employees
      parameters:
        - name: search
          in: query
          description: Full-text search on first_name, last_name, email
          schema:
            type: string
            example: "Philomena"
        - $ref: "#/components/parameters/DepartmentIdParam"
        - $ref: "#/components/parameters/DepartmentNameParam"
        - name: is_active
          in: query
          schema:
            type: boolean
            example: true
        - name: is_approved
          in: query
          schema:
            type: boolean
            example: false
        - name: role
          in: query
          schema:
            type: string
            enum:
              [
                staff,
                hr,
                manager,
                super_admin,
                call_centre_agent,
                call_centre_admin,
              ]
            example: "staff"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Paginated employee list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Employee"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [HR - Employees]
      summary: Create a new employee (HR only)
      operationId: create_employee
      description: |
        HR-initiated employee creation. A temporary password can be sent via email
        or HR can trigger a password-reset flow separately.
        Only done by HR & Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeCreateRequest"
      responses:
        "201":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Email already exists
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /employees/{id}:
    get:
      tags: [HR - Employees]
      summary: Get a single employee (HR only)
      operationId: get_employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [HR - Employees]
      summary: Update an employee (HR only)
      operationId: update_employee
      description: |
        Partial updates are accepted. Only provided fields are modified.
        Setting `is_approved: true` activates a pending self-registered account.
        Only done by HR & Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdateRequest"
      responses:
        "200":
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /employees/{id}/deactivate:
    post:
      tags: [HR - Employees]
      summary: Deactivate an employee (HR only)
      operationId: deactivate_employee
      description: |
        Sets `is_active: false`. Does not delete the record or its attendance history.
        Only done by HR & Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Employee deactivated."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /employees/{id}/approve:
    post:
      tags: [HR - Employees]
      summary: Approve a self-registered employee (HR only)
      operationId: approve_employee
      description: |
        Sets `is_approved: true`, allowing the employee to log in.
        Only done by HR & Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Employee approved."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==========================================================
  # DEPARTMENTS (HR)
  # ==========================================================
  /departments:
    get:
      tags: [HR - Departments]
      summary: List all departments
      operationId: list_departments
      responses:
        "200":
          description: All departments
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Department"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [HR - Departments]
      summary: Create a department (HR only)
      operationId: create_department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentRequest"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /departments/{id}:
    put:
      tags: [HR - Departments]
      summary: Update a department (HR only)
      operationId: update_department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentRequest"
      responses:
        "200":
          description: Department updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [HR - Departments]
      summary: Delete a department (HR only)
      operationId: delete_department
      description: |
        A department can only be deleted if it has no active employees.
        Attempting to delete a populated department returns `409`.
        **Roles:** HR, Admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "204":
          description: Department deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Department has active employees
          $ref: "#/components/responses/Conflict"

  # ==========================================================
  # REPORTS
  # ==========================================================
  /reports/attendance:
    get:
      tags: [Reports]
      summary: Attendance summary report (HR only)
      operationId: report_attendance
      description: |
        Returns per-employee attendance summaries for the given date range.
        Add `?format=csv` to download as a CSV file instead of JSON.
        Only done by HR & Admin
      parameters:
        - $ref: "#/components/parameters/DateFromParam"
        - $ref: "#/components/parameters/DateToParam"
        - $ref: "#/components/parameters/DepartmentIdParam"
        - $ref: "#/components/parameters/EmployeeIdParam"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Attendance summary (JSON or CSV)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportEmployeeAttendance"
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/attendance/departments:
    get:
      tags: [Reports]
      summary: Get attendance report for all departments (HR only)
      operationId: report_attendance_all_departments
      parameters:
        - $ref: "#/components/parameters/DateFromParam"
        - $ref: "#/components/parameters/DateToParam"
      responses:
        "200":
          description: Departments attendance records found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportDepartmentAttendance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/attendance/departments/{id}:
    get:
      tags: [Reports]
      summary: Get attendance report for one department (HR only)
      operationId: report_attendance_one_department
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - $ref: "#/components/parameters/DateFromParam"
        - $ref: "#/components/parameters/DateToParam"
      responses:
        "200":
          description: Department attendance record found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ReportDepartmentAttendance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/dashboard:
    get:
      tags: [Reports]
      summary: HR dashboard KPIs
      operationId: report_dashboard
      description: |
        Returns today's real-time headcount metrics.
        Only done by HR & Admin
      responses:
        "200":
          description: Dashboard KPIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_headcount:
                    type: integer
                    example: 47
                  present_today:
                    type: integer
                    example: 39
                  absent_today:
                    type: integer
                    example: 8
                  currently_clocked_in:
                    type: integer
                    example: 34
                  attendance_rate_today:
                    type: number
                    format: float
                    description: "Percentage 0–100"
                    example: 82.98
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
