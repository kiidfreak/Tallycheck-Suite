# Serves the Angular SPA and proxies API calls to the Flask backend.
# The prod frontend (environment.prod.ts) hits the backend at the domain root,
# so we proxy the known backend blueprint prefixes to the backend container.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/v2/* requests to Flask — pass the full URI unchanged.
    # Flask itself registers all blueprints under /api/v2 (see backend/__init__.py).
    # ^~ prevents the SPA fallback (location /) from matching these paths.
    location ^~ /api/v2/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
