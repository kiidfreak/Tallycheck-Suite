[mypy]
# Specify the Python version
python_version = 3.13

# Search path: current dir + shared libs
mypy_path = ., ../../../libs
explicit_package_bases = True

# Skip auto-generated Alembic migration files and the package init
exclude = (migrations|__init__\.py)

# Baseline strictness
ignore_missing_imports = True
follow_imports = normal
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True

# ----------------------------------------------------------------
# Third-party library suppressions (no stubs available)
# ----------------------------------------------------------------
[mypy-flask_sqlalchemy.*]
ignore_missing_imports = True

[mypy-flask_migrate.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-jwt.*]
ignore_missing_imports = True

# Flask-SQLAlchemy uses metaclass magic that mypy cannot follow.
# Suppress name-defined errors in models (db.Model is valid at runtime).
[mypy-models,backend.models]
disable_error_code = name-defined

# Shared library baked into Docker image - not live mounted, suppress errors
[mypy-py_config.*]
ignore_errors = True
