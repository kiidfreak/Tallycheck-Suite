version: '3.8'

services:
  db:
    image: postgres:15
    container_name: omni_intranet_db
    environment:
      POSTGRES_USER: omni_user
      POSTGRES_PASSWORD: omni_password
      POSTGRES_DB: omni_intranet_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
